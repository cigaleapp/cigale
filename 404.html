					stroke-linecap: square;
					stroke-dasharray: calc(3.14 * var(--size));
					transform-origin: calc(0.5 * var(--size)) calc(0.5 * var(--size));
					animation: spinner 1.5s linear infinite;
				}
			}

			#loading #loading-message {

				margin-top: 0.5em;
				opacity: 0.75;
				display: block;
				text-align: center;
			}

			#loading .app-version {

				bottom: 1.5rem;
				text-align: center;
				left: 0;
				right: 0;
				font-size: 0.8rem;
				color: gray;
			}

			#loading .progress-indicator {
				width: 100%;
				max-width: 600px;
				--spinner-size: 40px;
				height: var(--spinner-size);
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;

				progress:not([value]) {
					display: none;
				}

				progress[value] + .spinner {
					display: none;
				}
			}

			#loading progress {
				width: calc(100% - 20px);
				height: 5px;
				border-radius: 0;
				border: 0;

				appearance: none;
				-webkit-appearance: none;

				background: rgb(from var(--fg-neutral, white) r g b / 15%);

				&::-webkit-progress-value {
					background: var(--fg-neutral, white);
					transition: width 0.5s;
				}

				&::-moz-progress-bar {
					background: var(--fg-neutral, white);
					transition: width 0.5s;
				}
			}

			@keyframes spinner {
				0% {
					rotate: 0deg;
					stroke-dashoffset: calc(0.66 * var(--size));
				}
				50% {
					rotate: 720deg;
					stroke-dashoffset: calc(3.14 * var(--size));
				}
				100% {
					rotate: 1080deg;
					stroke-dashoffset: calc(0.66 * var(--size));
				}
			}
		</style>
