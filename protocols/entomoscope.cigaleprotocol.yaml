# yaml-language-server: $schema=../static/protocol.schema.json
id: fr.osug.terra-forma-web.entomoscope
name: Entomoscope

updates: automatic
version: 1
source: https://raw.githubusercontent.com/cigaleapp/cigale/main/protocols/entomoscope.cigaleprotocol.yaml

description: Protocole de collecte d'images d'insectes via l'Entomoscope

authors:
  - name: Jerome Briot
  - { name: Gwenn Le Bihan, email: gwenn.lebihan7@gmail.com }
  - name: Maxime Cauchoix

imports:
  - from: io.github.cigaleapp.arthropods.example
    metadataGroups:
      - taxonomy
    metadata:
      - species
      - identification_difficulty
      - conservation_status

crop:
  metadata: crop

sidecars:
  filepath: ./{{ stem filepath }}.json

remote:
  kobocollect:
    form: https://kf.kobotoolbox.org/#/forms/ao3ZXMuHX9hCufTYbEzEcY/summary
    title: |
      {{ trim survey.Esp_ce_de_la_fleur_naturelle }}, {{ formatDate survey.Date_et_heure_du_d_but_du_monitoring "dd MMM" }}
    thumbnails:
      - Prendre_une_photo_du_microhabi
      - Prendre_une_photo_du_microhabitat_monitor
      - Prendre_une_photo_du_paysgae

metadataOrder:
  # Session
  - monitoring_start
  - monitoring_end
  - device_location
  - microhabitat
  - landscape
  - inflorescence_count
  - samespecies_flowering_plants_count
  - flowering_plant_coverage
  - target
  - target_species
  - plantnat_score
  - grass_height
  - audio_enabled
  - timelapse_enabled
  - ai_enabled
  - fisheye
  # Observations
  - species
  - genus
  - family
  - order
  - class
  - phylum
  - kingdom
  - shoot_location
  - shoot_date
  - conservation_status
  - identification_difficulty

metadataGroups:
  recording_type:
    name: Type d'enregistrement
    description: Types d'enregistrement activés sur l'entomoscope
    collapsed: false

sessionMetadata:
  monitoring_start:
    type: date
    label: Début du monitoring
    kobocollect: Date_et_heure_du_d_but_du_monitoring
    description: Date de début du monitoring de l'entomoscope
    mergeMethod: min
    required: false
    range: past

  monitoring_end:
    type: date
    label: Fin du monitoring
    kobocollect: Date_et_heure_fin_du_monitoring
    description: Date de fin du monitoring de l'entomoscope
    mergeMethod: max
    required: false

  microhabitat:
    type: file
    label: Microhabitat
    kobocollect:
      - Prendre_une_photo_du_microhabi
      - Prendre_une_photo_du_microhabitat_monitor
    description: Photo du microhabitat monitoré
    mergeMethod: none
    required: false
    size:
      maximum: 5 MB

  device_location:
    type: location
    label: Emplacement de l'entomoscope
    kobocollect: Emplacement_de_l_entomoscope
    description: ''
    mergeMethod: average
    required: false

  landscape:
    type: file
    label: Paysage
    kobocollect: Prendre_une_photo_du_paysgae
    description: Photo du paysage environnant l'entomoscope
    mergeMethod: none
    required: false
    size:
      maximum: 5 MB

  inflorescence_count:
    type: integer
    label: Nombre d'inflorescences
    kobocollect: Nombre_d_inflorescen_monitor_e_hors_cadre
    description: Nombre d'inflorescences sur la plante monitorée hors cadre
    mergeMethod: average
    required: false
    range: ≥ 0

  samespecies_flowering_plants_count:
    type: integer
    label: Plantes en fleur de la même espèce
    kobocollect: Nombre_de_plantes_en_e_dans_un_rayon_d_1m
    description: Nombre de plantes en fleur de la même espèce que celle monitorée dans un rayon d'1m
    mergeMethod: average
    required: false
    range: ≥ 1

  flowering_plant_coverage:
    type: float
    label: Recouvrement floral
    kobocollect:
      - Recouvrement_en_de_dans_un_rayon_de_10m
      - Recouvrement_en_de_dans_un_rayon_de_2m
    description: Recouvrement en % de fleurs de toutes espèces confondues dans un rayon de 2m
    mergeMethod: average
    required: false
    range: 0..100

  target:
    type: enum
    label: Cible monitorée
    description: ''
    mergeMethod: none
    required: false
    kobocollect: Cible_monitoree
    options:
      - key: ground
        kobocollect: sol
        label: Sol
      - key: natural_flower
        kobocollect: fleur_naturelle
        label: Fleur naturelle
      - key: artificial_flower
        kobocollect: coupelle
        label: Fleur artificielle
      - key: barber
        kobocollect: barber
        label: Barber
      - key: malaise_trap
        kobocollect: tente_malaise
        label: Tente malaise
        description: Aussi appelé "Piège Malaise"
        learnMore: https://fr.wikipedia.org/wiki/Pi%C3%A8ge_Malaise

  target_species:
    type: string
    label: Espèce cible
    kobocollect: Esp_ce_de_la_fleur_naturelle
    description: Espèce de la plante ou du microhabitat monitoré, si applicable
    mergeMethod: none
    required: false

  plantnat_score:
    type: float
    label: Score plantn@t
    kobocollect: Score_plantn_t
    description: ''
    mergeMethod: average
    required: false

  grass_height:
    type: float
    label: Hauteur d'herbe
    kobocollect: Hauteur_d_herbe_cm
    unit: cm
    description: ''
    mergeMethod: average
    required: false
    range: x > 0

  audio_enabled:
    type: boolean
    group: recording_type
    label: Acoustique
    description: ''
    mergeMethod: min
    required: false
    kobocollect:
      list: Enregistrement
      choice: acoustique

  timelapse_enabled:
    type: boolean
    group: recording_type
    label: Timelapse
    description: ''
    mergeMethod: min
    required: false
    kobocollect:
      list: Enregistrement
      choice: photo_time_lapse

  ai_enabled:
    type: boolean
    group: recording_type
    label: IA
    description: ''
    mergeMethod: min
    required: false
    kobocollect:
      list: Enregistrement
      choice: photo_ia

  fisheye:
    type: boolean
    label: Photo fisheye
    kobocollect:
      list: Photo_fisheye
      'true': oui
      'false': non
    description: Utilisé pour calculer l'ensoleillement
    mergeMethod: average
    required: true
    default: false

metadata:
  shoot_location:
    type: location
    label: Lieu
    description: Lieu de prise de vue
    mergeMethod: average
    required: false
    infer:
      sidecar: |
        {
          "latitude": EntomoscopeLatitude, 
          "longitude": EntomoscopeLongitude
        }

  altitude:
    type: float
    label: Altitude
    description: Altitude de l'entomoscope
    unit: m
    required: false
    mergeMethod: average
    infer:
      sidecar: EntomoscopeAltitude
  crop_inference_model:
    type: string
    label: Modèle utilisé pour la détection
    description: Nom du modèle d'inférence utilisé par l'entomoscope pour générer les métadonnées de crop
    mergeMethod: none
    required: false
    infer:
      sidecar: EntomoscopeAiModel
  camera_model:
    type: enum
    label: Modèle de caméra
    description: Modèle de caméra de l'entomoscope
    mergeMethod: none
    required: false
    options:
      - { key: v1, label: V1, description: ... }
      - { key: v2, label: V2, description: ... }
      - { key: v3, label: V3, description: ... }
      - { key: hq, label: HQ, description: ... }
    infer:
      sidecar: EntomoscopeCameraModel
  raspberry_model:
    type: string
    label: Modèle de Raspberry Pi
    description: Modèle de Raspberry Pi utilisé dans l'entomoscope
    mergeMethod: none
    required: false
    infer:
      sidecar: EntomoscopeRaspberryPiModel
  raspberry_serial_number:
    type: string
    label: Numéro de série du Raspberry Pi
    description: Numéro de série du Raspberry Pi utilisé dans l'entomoscope
    mergeMethod: none
    required: false
    infer:
      sidecar: EntomoscopeRaspberryPiSerialNumber
  shoot_date:
    type: date
    label: Date
    description: Date de prise de vue
    mergeMethod: average
    required: false
    infer:
      sidecar: FrameWallClock * 1e-6 ~> $fromMillis
  brightness:
    type: float
    label: Luminosité
    description: Luminosité mesurée par l'entomoscope, en lux
    mergeMethod: average
    required: false
    # unit: lx
    infer:
      sidecar: Lux
  led_intensity:
    type: integer
    label: Intensité des LEDs
    description: Intensité des LEDs de l'entomoscope, de 0 à 100
    mergeMethod: average
    range: 0..100
    required: false
    infer:
      sidecar: EntomoscopeLedsFrontIntensity ~> $clamp(0, 100)
  site:
    type: string
    label: ID du site
    description: ID du site d'installation de l'entomoscope
    mergeMethod: none
    required: true
    infer:
      sidecar: EntomoscopeSiteID
  misc_config:
    type: file
    description: Tout les paramètres de configuration de l'entomoscope, encodés en JSON
    label: ''
    mergeMethod: none
    required: false
    infer:
      sidecar: |
        {
          "name": $stem($sidecarfile.name) & ".json",
          "content": $json($, "\t"),
          "type": "application/json",
          "lastModified": $sidecarfile.lastModified
        }
  crop:
    type: boundingbox
    description: Boîte englobante du crop d'insecte détecté par l'entomoscope
    label: ''
    mergeMethod: union
    required: false
    infer:
      sidecar: |
        (
          $boxes := EntomoscopeAiPredictionBoxes;
          $scores := EntomoscopeAiPredictionConf;
          $map($boxes, function($box, $i) {
            {
              "cx": $box[0] ~> $clamp(0, 1),
              "cy": $box[1] ~> $clamp(0, 1),
              "w": $box[2] ~> $clamp(0, 1),
              "h": $box[3] ~> $clamp(0, 1),
              "score": $scores[$i] ~> $clamp(0, 1)
            }
          })
        )
