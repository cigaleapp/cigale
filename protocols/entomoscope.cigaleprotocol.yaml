# yaml-language-server: $schema=../static/protocol.schema.json
id: fr.osug.terra-forma-web.entomoscope
name: Entomoscope

updates: automatic
version: 4
source: https://raw.githubusercontent.com/cigaleapp/cigale/main/protocols/entomoscope.cigaleprotocol.yaml

description: Protocole de collecte d'images d'insectes via l'Entomoscope

authors:
  - name: Jerome Briot
  - { name: Gwenn Le Bihan, email: gwenn.lebihan7@gmail.com }
  - name: Maxime Cauchoix

imports:
  - from: io.github.cigaleapp.arthropods.example
    metadataGroups:
      - taxonomy
    metadata:
      - species
      - identification_difficulty
      - conservation_status

crop:
  metadata: crop

sidecars:
  filepath: ./{{ stem filepath }}.json

remote:
  kobocollect:
    form: https://kf.kobotoolbox.org/#/forms/ao3ZXMuHX9hCufTYbEzEcY/summary
    title: '{{ survey.session_id }}'
    thumbnails:
      - microhabitat
      - landscape

metadataOrder:
  # Session
  - session_id
  - monitoring_start
  - monitoring_end
  - device_location
  - starting_temperature
  - microhabitat
  - landscape
  - inflorescence_count
  - samespecies_flowering_plants_count
  - flowering_plant_coverage
  - target
  - target_species
  - plantnat_score
  - grass_height
  - audio_enabled
  - timelapse_enabled
  - ai_enabled
  - fisheye
  # Observations
  - species
  - genus
  - family
  - order
  - class
  - phylum
  - kingdom
  - shoot_location
  - shoot_date
  - conservation_status
  - identification_difficulty

metadataGroups:
  recording_type:
    name: Type d'enregistrement
    description: Types d'enregistrement activés sur l'entomoscope
    collapsed: false

sessionMetadata:
  session_id:
    type: string
    label: ID de session
    description: Nomsite_année_mois_jour_IDentomoscope_mode_numérosession. par exemple, "JadMoulis_2026_04_01_b7ab8683_pitfall"
    mergeMethod: none
    required: false
    pattern: |
      alphanumeric one or more times, underscore,
      year, underscore,
      month, underscore,
      day, underscore,
      alphanumeric one or more times, underscore,
      alphanumeric one or more times, 
      group underscore, number end group optional

  monitoring_start:
    type: date
    label: Début du monitoring
    description: Date de début du monitoring de l'entomoscope
    mergeMethod: min
    required: false
    range: past

  monitoring_end:
    type: date
    label: Fin du monitoring
    description: Date de fin du monitoring de l'entomoscope
    mergeMethod: max
    required: false

  starting_temperature:
    type: float
    label: Température de départ
    description: Température au lancement du dispositif
    unit: °C
    mergeMethod: average
    required: false
    range: x > -273.15

  starting_cloud_coverage:
    type: enum
    label: Couverture nuageuse
    description: Couverture nuageuse au lancement du dispositif
    mergeMethod: average
    required: false
    options:
      - key: 0-25
        kobocollect: 0_25
        label: 0 à 25%
      - key: 25-50
        kobocollect: 25_50
        label: 25 à 50%
      - key: 50-75
        kobocollect: 50_75
        label: 50 à 75%
      - key: 75-100
        kobocollect: 75_100
        label: 75 à 100%

  starting_wind_speed:
    type: enum
    label: Vent
    description: lors du lancement du dispositif, en échelle de Beaufort
    required: false
    mergeMethod: average
    options:
      - key: '0'
        label: 0 - Pas de vent
      - key: '1'
        label: 1 - Très légère brise (dérive de la fumée)
      - key: '2'
        label: 2 - Légère brise (bruissement des feuilles / girouettes commencent à tourner)
      - key: '3'
        label: 3 - Brise (feuilles et brindilles en constant mouvement)
      - key: '4'
        label: 4 - Brise modérée (poussière, feuilles et petites branches en agitation)
      - key: '5'
        label: 5 - Brise forte (jeunes arbres commencent à se balancer)
      - key: '6'
        label: 6 - Brise très forte (grosses branches des arbres en mouvement, sifflement du vent)
      - key: '7'
        label: 7 - Tempête (grands arbres en mouvement, résistance du vent lors de la marche)

  microhabitat:
    type: file
    label: Microhabitat
    description: Photo du microhabitat monitoré
    mergeMethod: none
    required: false
    size:
      maximum: 5 MB

  device_location:
    type: location
    label: Emplacement de l'entomoscope
    description: ''
    mergeMethod: average
    required: false

  landscape:
    type: file
    label: Paysage
    description: Photo du paysage environnant l'entomoscope
    mergeMethod: none
    required: false
    size:
      maximum: 5 MB

  inflorescence_count:
    type: integer
    label: Nombre d'inflorescences
    description: Nombre d'inflorescences sur la plante monitorée hors cadre
    mergeMethod: average
    required: false
    range: ≥ 0

  samespecies_flowering_plants_count:
    type: integer
    label: Plantes en fleur de la même espèce
    description: Nombre de plantes en fleur de la même espèce que celle monitorée dans un rayon d'1m
    mergeMethod: average
    required: false
    range: ≥ 1

  flowering_plant_coverage:
    type: float
    label: Recouvrement floral
    description: Recouvrement en % de fleurs de toutes espèces confondues dans un rayon de 2m
    mergeMethod: average
    required: false
    range: 0..100

  target:
    type: enum
    label: Cible monitorée
    description: ''
    mergeMethod: none
    required: false
    options:
      - key: ground
        kobocollect: sol
        label: Sol
      - key: natural_flower
        kobocollect: fleur_naturelle
        label: Fleur naturelle
      - key: artificial_flower
        kobocollect: coupelle
        label: Fleur artificielle
      - key: barber
        kobocollect: barber
        label: Barber
      - key: malaise_trap
        kobocollect: tente_malaise
        label: Tente malaise
        description: Aussi appelé "Piège Malaise"
        learnMore: https://fr.wikipedia.org/wiki/Pi%C3%A8ge_Malaise

  target_species:
    type: string
    label: Espèce cible
    description: Espèce de la plante ou du microhabitat monitoré, si applicable
    mergeMethod: none
    required: false

  plantnat_score:
    type: float
    label: Score plantn@t
    description: ''
    mergeMethod: average
    required: false

  grass_height:
    type: float
    label: Hauteur d'herbe
    unit: cm
    description: ''
    mergeMethod: average
    required: false
    range: x > 0

  audio_enabled:
    type: boolean
    group: recording_type
    label: Acoustique
    description: ''
    mergeMethod: min
    required: false
    kobocollect:
      list: recording_type
      choice: acoustique

  timelapse_enabled:
    type: boolean
    group: recording_type
    label: Timelapse
    description: ''
    mergeMethod: min
    required: false
    kobocollect:
      list: recording_type
      choice: photo_time_lapse

  ai_enabled:
    type: boolean
    group: recording_type
    label: IA
    description: ''
    mergeMethod: min
    required: false
    kobocollect:
      list: recording_type
      choice: photo_ia

  fisheye:
    type: boolean
    label: Photo fisheye
    kobocollect:
      list: fisheye
      'true': oui
      'false': non
    description: Utilisé pour calculer l'ensoleillement
    mergeMethod: average
    required: true
    default: false

metadata:
  shoot_location:
    type: location
    label: Lieu
    description: Lieu de prise de vue
    mergeMethod: average
    required: false
    infer:
      sidecar: |
        EntomoscopeLatitude = "" or EntomoscopeLongitude = "" ? null :
        {
          /* 1.2345 N */
          "latitude": EntomoscopeLatitude ~> $string ~> $replace("N", "") ~> $trim ~> $number ,
          /* 1.2345 E */
          "longitude": EntomoscopeLongitude ~> $string ~> $replace("E", "") ~> $trim ~> $number
        }

  altitude:
    type: float
    label: Altitude
    description: Altitude de l'entomoscope
    unit: m
    required: false
    mergeMethod: average
    infer:
      sidecar: EntomoscopeAltitude
  crop_inference_model:
    type: string
    label: Modèle utilisé pour la détection
    description: Nom du modèle d'inférence utilisé par l'entomoscope pour générer les métadonnées de crop
    mergeMethod: none
    required: false
    infer:
      sidecar: EntomoscopeAiModel
  camera_model:
    type: enum
    label: Modèle de caméra
    description: Modèle de caméra de l'entomoscope
    mergeMethod: none
    required: false
    options:
      - { key: v1, label: V1, description: ... }
      - { key: v2, label: V2, description: ... }
      - { key: v3, label: V3, description: ... }
      - { key: hq, label: HQ, description: ... }
    infer:
      sidecar: EntomoscopeCameraModel
  raspberry_model:
    type: string
    label: Modèle de Raspberry Pi
    description: Modèle de Raspberry Pi utilisé dans l'entomoscope
    mergeMethod: none
    required: false
    infer:
      sidecar: EntomoscopeRaspberryPiModel
  raspberry_serial_number:
    type: string
    label: Numéro de série du Raspberry Pi
    description: Numéro de série du Raspberry Pi utilisé dans l'entomoscope
    mergeMethod: none
    required: false
    infer:
      sidecar: EntomoscopeRaspberryPiSerialNumber
  shoot_date:
    type: date
    label: Date
    description: Date de prise de vue
    mergeMethod: average
    required: false
    infer:
      sidecar: FrameWallClock * 1e-6 ~> $fromMillis
  brightness:
    type: float
    label: Luminosité
    description: Luminosité mesurée par l'entomoscope, en lux
    mergeMethod: average
    required: false
    # unit: lx
    infer:
      sidecar: Lux
  led_intensity:
    type: integer
    label: Intensité des LEDs
    description: Intensité des LEDs de l'entomoscope, de 0 à 100
    mergeMethod: average
    range: 0..100
    required: false
    infer:
      sidecar: EntomoscopeLedsFrontIntensity ~> $clamp(0, 100)
  site:
    type: string
    label: ID du site
    description: ID du site d'installation de l'entomoscope
    mergeMethod: none
    required: true
    infer:
      sidecar: EntomoscopeSiteID
  misc_config:
    type: file
    description: Tout les paramètres de configuration de l'entomoscope, encodés en JSON
    label: ''
    mergeMethod: none
    required: false
    infer:
      sidecar: |
        {
          "name": $stem($sidecarfile.name) & ".json",
          "content": $json($, "\t"),
          "type": "application/json",
          "lastModified": $sidecarfile.lastModified
        }
  crop:
    type: boundingbox
    description: Boîte englobante du crop d'insecte détecté par l'entomoscope
    label: ''
    mergeMethod: union
    required: false
    infer:
      # TODO: guard against missing or malformed metadata
      # and return an empty array in that case
      sidecar: |
        EntomoscopeAiEnable = false ? [] : 
        (
          $boxes := EntomoscopeAiPredictionBoxes;
          $scores := EntomoscopeAiPredictionConf;
          $map($boxes, function($box, $i) {
            {
              "cx": $box[0] ~> $clamp(0, 1),
              "cy": $box[1] ~> $clamp(0, 1),
              "w": $box[2] ~> $clamp(0, 1),
              "h": $box[3] ~> $clamp(0, 1),
              "score": $scores[$i] ~> $clamp(0, 1)
            }
          })
        )
