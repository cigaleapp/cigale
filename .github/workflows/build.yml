name: Build

env:
  ELECTRON_SKIP_BINARY_DOWNLOAD: 'true'

on:
  workflow_call:
    inputs:
      debug:
        required: false
        type: boolean
        default: true
        description: Build with debug info (non-minified + sourcemaps)
      # TODO: remove once we don't have to publish to Github Pages
      github-pages:
        required: false
        type: boolean
        default: false
        description: Build for Github Pages (sets SVELTE_FALLBACK_PAGE to 404.html and BASE_PATH to the repo name, which is required for correct routing on Github Pages)
    outputs:
      artifact:
        description: The build artifact name
        value: ${{ jobs.app.outputs.artifact }}

jobs:
  app:
    runs-on: ubuntu-latest
    name: App
    outputs:
      artifact: ${{ steps.artifact.outputs.name }}
    env:
      DEBUG: ${{ inputs.debug }}
      GITHUB_PAGES: ${{ inputs.github-pages }}
      PR_NUMBER: ${{ github.event.number }}
      BUILD_COMMIT: ${{ github.sha }}
      BUILTIN_PROTOCOLS: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}/examples/arthropods.cigaleprotocol.json,https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref }}/protocols/insecta.cigaleprotocol.yaml,https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref || github.ref_name }}/protocols/entomoscope.cigaleprotocol.yaml
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Set env vars depending on $PR_NUMBER
        run: |
          if [[ -z "$PR_NUMBER" ]]; then
            echo "WEB_ORIGIN=https://cigaleapp.github.io" >> $GITHUB_ENV
          else
            echo "WEB_ORIGIN=https://pr-${PR_NUMBER}.cigale.gwen.works" >> $GITHUB_ENV
          fi

          if [[ "$GITHUB_PAGES" == "true" ]]; then
            echo "SVELTE_FALLBACK_PAGE=404.html" >> $GITHUB_ENV
            echo "BASE_PATH=/$(basename $GITHUB_REPOSITORY)" >> $GITHUB_ENV
          else
            echo "SVELTE_FALLBACK_PAGE=index.html" >> $GITHUB_ENV
            echo "BASE_PATH=" >> $GITHUB_ENV
          fi
      - name: Build
        run: bun run build
      - name: Determine artifact name
        id: artifact
        run: echo "name=build-${{ case(inputs.debug, 'debug', 'production') }}-${{ github.sha }}-${{ case(inputs.github-pages, 'ghpages', '') }}" >> $GITHUB_OUTPUT
      - name: Upload build as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.name }}
          include-hidden-files: true
          path: |
            public
            .svelte-kit
