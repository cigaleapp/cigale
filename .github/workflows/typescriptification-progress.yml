name: Update TypeScriptification Progress

on:
  workflow_dispatch:
  pull_request:
    branches:
      - typescriptify
      - '*-typescriptify'
      - typescriptify-*
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      ISSUE_NUMBER: 190
      PR_NUMBER: ${{ github.event.pull_request.number }}

    name: Update ${{ github.event.pull_request && 'PR' || 'Issue' }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Count converted files
        id: count
        shell: bash
        run: |
          JS=0
          TS=0

          JS_FILES=""
          TS_FILES=""

          while IFS= read -r file; do
            REL="${file#./}"

            case "$file" in
              *.svelte.ts)
                TS=$((TS+1))
                TS_FILES+="$REL"$'\n'
                ;;

              *.svelte.js)
                JS=$((JS+1))
                JS_FILES+="$REL"$'\n'
                ;;

              *.svelte)
                if grep -Eq '<script[^>]*lang=["'\'']ts["'\'']' "$file"; then
                  TS=$((TS+1))
                  TS_FILES+="$REL"$'\n'
                else
                  JS=$((JS+1))
                  JS_FILES+="$REL"$'\n'
                fi
                ;;

              *.ts)
                TS=$((TS+1))
                TS_FILES+="$REL"$'\n'
                ;;

              *.js)
                JS=$((JS+1))
                JS_FILES+="$REL"$'\n'
                ;;
            esac
          done < <(
            find . \
              -type d \( \
                -name .git -o \
                -name node_modules -o \
                -name dist -o \
                -name build \
              \) -prune -o \
              -type f \
              \( \
                -name "*.js" -o \
                -name "*.ts" -o \
                -name "*.svelte" -o \
                -name "*.svelte.js" -o \
                -name "*.svelte.ts" \
              \) -print
          )

          TOTAL=$((JS + TS))

          if [ "$TOTAL" -eq 0 ]; then
            PERCENT="0.0"
          else
            PERCENT=$(awk "BEGIN { printf \"%.1f\", ($TS/$TOTAL)*100 }")
          fi

          {
            echo "js=$JS"
            echo "ts=$TS"
            echo "total=$TOTAL"
            echo "percent=$PERCENT"

            echo "js_files<<EOF"
            printf "%s" "$JS_FILES"
            echo
            echo "EOF"

            echo "ts_files<<EOF"
            printf "%s" "$TS_FILES"
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update ${{ env.PR_NUMBER && 'PR' || 'issue' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          GITHUB_TOKEN: ${{ github.token }}

          ISSUE_NUMBER: ${{ env.ISSUE_NUMBER }}
          PR_NUMBER: ${{ env.PR_NUMBER }}

          JS: ${{ steps.count.outputs.js }}
          TS: ${{ steps.count.outputs.ts }}
          TOTAL: ${{ steps.count.outputs.total }}
          PERCENT: ${{ steps.count.outputs.percent }}

          JS_FILES: ${{ steps.count.outputs.js_files }}
          TS_FILES: ${{ steps.count.outputs.ts_files }}
        with:
          script: |
            const is_pr = Boolean(process.env.PR_NUMBER);
            const pr_number = is_pr ? Number(process.env.PR_NUMBER) : null;
            const issue_number = Number(process.env.ISSUE_NUMBER);

            const jsFiles = (process.env.JS_FILES || "").trim();
            const tsFiles = (process.env.TS_FILES || "").trim();

            const section = `
            <!-- ts-progress:start -->
            ## TypeScript Migration Progress

            | Type | Count |
            |------|------:|
            | JavaScript | ${process.env.JS} |
            | TypeScript | ${process.env.TS} |
            | Total | ${process.env.TOTAL} |

            **Progress:** ${process.env.TS}/${process.env.TOTAL} (${process.env.PERCENT}%)

            <details>
            <summary>JavaScript files (${process.env.JS})</summary>

            \`\`\`text
            ${jsFiles}
            \`\`\`

            </details>

            <details>
            <summary>TypeScript files (${process.env.TS})</summary>

            \`\`\`text
            ${tsFiles}
            \`\`\`

            </details>

            <!-- ts-progress:end -->
            `.trim();

            function update_body(existing) {
              let body = existing || "";

              const regex =
                /<!-- ts-progress:start -->[\s\S]*?<!-- ts-progress:end -->/;

              if (regex.test(body)) {
                body = body.replace(regex, section);
              } else {
                body += "\n\n" + section;
              }

              return body
            }

            if (is_pr) {

              const { data: issue } = await github.rest.issues.get({
                ...context.repo,
                issue_number
              });

              await github.rest.issues.update({
                ...context.repo
                issue_number,
                body: update_body(issue.body)
              });

            } else {

              const { data: pr } = await github.rest.pulls.get({
                ...context.repo,
                pull_number: pr_number,
              })

              await github.rest.pulls.update({
                ...context.repo,
                pull_number: pr_number,
                body: update_body(pr.body)
              })

            }
