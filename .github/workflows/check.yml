name: Checks

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  db-revision:
    name: Database revision is not decreased
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Check database revision monotonicity
        run: |
          current_revision=$(sed -nE 's/^export const databaseRevision[[:space:]]*=[[:space:]]*([0-9]+);?$/\1/p' src/lib/idb.svelte.js)
          if [ -z "$current_revision" ]; then
            echo "Could not read current databaseRevision from src/lib/idb.svelte.js"
            exit 1
          fi

          null_sha="0000000000000000000000000000000000000000"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            previous_sha="${{ github.event.pull_request.base.sha }}"
          else
            previous_sha="${{ github.event.before }}"
          fi

          if [ "$previous_sha" = "$null_sha" ]; then
            echo "No previous commit available (new branch/repository history edge case), skipping comparison."
            exit 0
          fi

          previous_revision=$(
            git show "$previous_sha:src/lib/idb.svelte.js" \
              | sed -nE 's/^export const databaseRevision[[:space:]]*=[[:space:]]*([0-9]+);?$/\1/p'
          )
          if [ -z "$previous_revision" ]; then
            echo "Could not read previous databaseRevision from src/lib/idb.svelte.js at $previous_sha"
            exit 1
          fi

          if ! [[ "$previous_revision" =~ ^[0-9]+$ && "$current_revision" =~ ^[0-9]+$ ]]; then
            echo "databaseRevision values must be integers. Got previous='$previous_revision', current='$current_revision'."
            exit 1
          fi

          echo "Previous databaseRevision: $previous_revision"
          echo "Current databaseRevision: $current_revision"

          if [ "$current_revision" -lt "$previous_revision" ]; then
            echo "databaseRevision decreased from $previous_revision to $current_revision."
            exit 1
          fi

          echo "databaseRevision did not decrease."

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint

  json-schema:
    name: Validate JSONs
    uses: ./.github/workflows/schemas.yml

  clutter:
    name: Check for clutter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Check for clutter
        run: bun knip --reporter github-actions

  build:
    name: Build (production)
    uses: ./.github/workflows/build.yml
    with:
      debug: false

  build-github-pages:
    if: github.event_name == 'push' && github.ref_name == 'main'
    name: Build (GitHub Pages)
    uses: ./.github/workflows/build.yml
    with:
      debug: false
      github-pages: true

  test:
    needs: lint
    name: Unit tests
    uses: ./.github/workflows/vitest.yml
    secrets: inherit
    with:
      compare-coverage: ${{ github.event_name == 'pull_request' }}

  build-debug:
    # Run on PRs (only if not in draft) or on other events
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    name: Build (debug)
    uses: ./.github/workflows/build.yml
    with:
      debug: true

  e2e-concurrency:
    name: Compute E2E concurrency bucket
    runs-on: ubuntu-latest
    outputs:
      bucket: ${{ steps.bucket.outputs.bucket }}
    steps:
      - name: Compute bucket from run number
        id: bucket
        run: echo "bucket=$(( RUN_NUMBER % 4 ))" >> "$GITHUB_OUTPUT"
        env:
          RUN_NUMBER: ${{ github.run_number }}

  e2e:
    needs: [build-debug, json-schema, lint, test, e2e-concurrency]
    name: E2E
    concurrency:
      group: playwright-${{ needs.e2e-concurrency.outputs.bucket }}
      cancel-in-progress: false
    uses: ./.github/workflows/playwright.yml
    secrets: inherit
    with:
      artifact: ${{ needs.build-debug.outputs.artifact }}

  bundlesize:
    if: github.ref_name != 'main'
    needs: test
    name: Bundle size
    uses: ./.github/workflows/bundlesize.yml
    secrets: inherit

  preview:
    if: github.event_name == 'pull_request'
    needs: [build, json-schema]
    name: PR Preview
    uses: ./.github/workflows/preview.yml
    secrets: inherit
    with:
      artifact: ${{ needs.build.outputs.artifact }}

  deploy:
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: [build-github-pages, e2e, dont-merge-comment]
    name: Deploy
    concurrency:
      group: deploy-gh-pages
      cancel-in-progress: true
    uses: ./.github/workflows/deploy.yml
    with:
      artifact: ${{ needs.build-github-pages.outputs.artifact }}

  electron:
    if: github.event_name == 'pull_request'
    needs: [e2e]
    name: Electron
    uses: ./.github/workflows/electron.yml

  dont-merge-comment:
    name: Check for presence of "do not merge" comment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - run: |
          # Check for "do not merge" comment in the codebase
          if git grep -q "$prefix: $message"; then
            echo "Found "$prefix: $message" in source code. Failing the job."
            exit 1
          else
            echo "No "$prefix: $message" found in source code."
          fi
        env:
          prefix: XXX
          message: DONT MERGE

  is-mergeable:
    if: github.event_name == 'pull_request' && !cancelled()
    name: Mergeable?
    needs:
      - db-revision
      - build
      - json-schema
      - lint
      - test
      - e2e
      - clutter
      - preview
      - electron
      - bundlesize
      - dont-merge-comment
    runs-on: ubuntu-latest
    steps:
      - if: contains(needs.*.result, 'failure')
        run: echo "Some tests failed :'("; exit 1
      - if: ${{ !contains(needs.*.result, 'failure') }}
        run: echo "All checks passed! This PR is mergeable :D"

  nightly-apk:
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: [build, test]
    name: Nightly APK
    uses: ./.github/workflows/android.yml
    secrets:
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_PROD_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_PROD_KEY_PASSWORD }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_PROD_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_PROD_KEYSTORE_PASSWORD }}
      DIAWI_TOKEN: ${{ secrets.DIAWI_TOKEN }}
      DEV_DEPLOYMENTS_SSH_PRIVATE_KEY: ${{ secrets.DEV_DEPLOYMENTS_SSH_PRIVATE_KEY }}
      DEV_DEPLOYMENTS_HOST_KEY: ${{ secrets.DEV_DEPLOYMENTS_HOST_KEY }}
    with:
      flavor: nightly
      artifact: ${{ needs.build.outputs.artifact }}
      version: NIGHTLY/${{ github.sha }}
      app-name: Cigale Dev
      diawi-comment: |
        This is a nightly build from the ${{ github.ref_name }} branch.

        Branch: https://github.com/${{ github.repository }}/tree/${{ github.ref_name }}

  apk-webpage:
    if: github.event_name == 'push' && github.ref_name == 'main'
    name: Prepare APK webpage
    needs: [deploy, nightly-apk]
    runs-on: ubuntu-latest
    steps:
      - name: Retrieve APK file
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ needs.nightly-apk.outputs.artifact }}

      - name: Create a simple index.html
        run: |
          mv app.apk cigale.apk
          echo "<html><body>" > index.html
          echo "<h1>Latest APK</h1>" >> index.html
          echo "<p>Built from commit ${{ github.sha }} on branch ${{ github.ref_name }}.</p>" >> index.html
          echo "<a href=\"app.apk\">Download APK</a>" >> index.html
          echo "<p>Scan the QR code below to download the APK on your Android device:</p>" >> index.html
          echo "<img alt=\"QR code\" src=\"https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://apk.cigale.gwen.works/cigale.apk\">" >> index.html
          echo "</body></html>" >> index.html

      - name: Save artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: apk-webpage
          path: |
            index.html
            cigale.apk

  apk-webpage-deploy:
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: apk-webpage
    name: Upload latest APK to dev deployments
    uses: ./.github/workflows/dev-deploy.yml
    secrets: inherit
    with:
      environment: APK Download Page
      artifact: apk-webpage
      path: /
      subdomain: apk
