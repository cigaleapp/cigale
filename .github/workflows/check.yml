name: Checks

on:
  pull_request:
    types: [synchronize, closed, converted_to_draft, ready_for_review, unlabeled, labeled]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  db-revision:
    name: Database revision is not decreased
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: ./.github/actions/number-change
        id: change
        with:
          file: src/lib/idb.svelte.js
          lhs: export const databaseRevision =
      - run: |
          if [[ "${{ steps.change.outputs.decreased }}" = "false" ]]; then
            exit 0
          else
            echo Database revision was decreased
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint

  json-schema:
    name: Validate JSONs
    uses: ./.github/workflows/schemas.yml

  clutter:
    name: Check for clutter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Check for clutter
        run: bun knip --reporter github-actions

  build:
    name: Build (production)
    uses: ./.github/workflows/build.yml
    with:
      debug: false

  build-github-pages:
    if: github.event_name == 'push' && github.ref_name == 'main'
    name: Build (GitHub Pages)
    uses: ./.github/workflows/build.yml
    with:
      debug: false
      github-pages: true

  test:
    needs: lint
    name: Unit tests
    uses: ./.github/workflows/vitest.yml
    secrets: inherit
    with:
      compare-coverage: ${{ github.event_name == 'pull_request' }}

  build-debug:
    # Run on PRs (only if not in draft) or on other events
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft || contains(github.event.pull_request.labels.*.name, 'unminified-preview')
    name: Build (debug)
    uses: ./.github/workflows/build.yml
    with:
      debug: true

  e2e-concurrency:
    name: Compute E2E concurrency bucket
    runs-on: ubuntu-latest
    outputs:
      bucket: ${{ steps.bucket.outputs.bucket }}
    steps:
      - name: Compute bucket from run number
        id: bucket
        run: |
          bucket=$(( (RUN_NUMBER + RUN_ATTEMPT) % 4 ))
          echo "Computed bucket: $bucket"
          echo "bucket=$bucket" >> "$GITHUB_OUTPUT"
        env:
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}

  e2e:
    needs: [build-debug, json-schema, lint, test, e2e-concurrency]
    name: E2E
    concurrency:
      group: playwright-${{ needs.e2e-concurrency.outputs.bucket }}
      queue: max
    uses: ./.github/workflows/playwright.yml
    secrets: inherit
    with:
      artifact: ${{ needs.build-debug.outputs.artifact }}

  bundlesize:
    if: github.ref_name != 'main'
    needs: test
    name: Bundle size
    uses: ./.github/workflows/bundlesize.yml
    secrets: inherit

  preview:
    if: github.event_name == 'pull_request'
    needs: [build, build-debug, json-schema]
    name: PR Preview
    uses: ./.github/workflows/preview.yml
    secrets: inherit
    with:
      artifact: ${{ contains(github.event.pull_request.labels.*.name, 'unminified-preview') && needs.build-debug.outputs.artifact || needs.build.outputs.artifact }}

  deploy:
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: [build-github-pages, e2e, dont-merge-comment]
    name: Deploy
    concurrency:
      group: deploy-gh-pages
      cancel-in-progress: true
    uses: ./.github/workflows/deploy.yml
    with:
      artifact: ${{ needs.build-github-pages.outputs.artifact }}

  check-native-version:
    if: contains(github.event.pull_request.labels.*.name, 'android-native-changes')
    name: Ensure native code version bump
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Get native code version change
        id: version
        uses: ./.github/actions/number-change
        with:
          file: android/.native-code-version
          lhs: ''

      - name: Verify that it changed
        run: |
          if [[ "${{ steps.version.outputs.changed }}" == "true" ]]; then
            exit 0
          else
            echo "android/.native-code-version didn't change!!"
            exit 1
          fi

  dont-merge-comment:
    name: Check for presence of "do not merge" comment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: |
          # Check for "do not merge" comment in the codebase
          if git grep -q "$prefix: $message"; then
            echo "Found "$prefix: $message" in source code. Failing the job."
            exit 1
          else
            echo "No "$prefix: $message" found in source code."
          fi
        env:
          prefix: XXX
          message: DONT MERGE

  is-mergeable:
    if: github.event_name == 'pull_request' && !cancelled()
    name: Mergeable?
    needs:
      - db-revision
      - build
      - json-schema
      - lint
      - test
      - e2e
      - clutter
      - preview
      - bundlesize
      - dont-merge-comment
      - check-native-version
    runs-on: ubuntu-latest
    steps:
      - if: contains(needs.*.result, 'failure')
        run: echo "Some tests failed :'("; exit 1
      - if: ${{ !contains(needs.*.result, 'failure') }}
        run: echo "All checks passed! This PR is mergeable :D"

  nightly-apk:
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: [build, test]
    name: Nightly APK
    uses: ./.github/workflows/android.yml
    secrets:
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_PROD_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_PROD_KEY_PASSWORD }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_PROD_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_PROD_KEYSTORE_PASSWORD }}
      DIAWI_TOKEN: ${{ secrets.DIAWI_TOKEN }}
      DEV_DEPLOYMENTS_SSH_PRIVATE_KEY: ${{ secrets.DEV_DEPLOYMENTS_SSH_PRIVATE_KEY }}
      DEV_DEPLOYMENTS_HOST_KEY: ${{ secrets.DEV_DEPLOYMENTS_HOST_KEY }}
    with:
      push-update: true
      flavor: nightly
      artifact: ${{ needs.build.outputs.artifact }}
      app-name: Cigale Dev
      diawi-comment: |
        This is a nightly build from the ${{ github.ref_name }} branch.

        Branch: https://github.com/${{ github.repository }}/tree/${{ github.ref_name }}

  apk-webpage:
    if: github.event_name == 'push' && github.ref_name == 'main'
    name: Prepare APK webpage
    needs: [deploy, nightly-apk]
    runs-on: ubuntu-latest
    steps:
      - name: Retrieve APK file
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ needs.nightly-apk.outputs.artifact }}

      - name: Create a simple index.html
        run: |
          mv app.apk cigale.apk
          echo "<html><body>" > index.html
          echo "<h1>Latest APK</h1>" >> index.html
          echo "<p>Built from commit ${{ github.sha }} on branch ${{ github.ref_name }}.</p>" >> index.html
          echo "<a href=\"app.apk\">Download APK</a>" >> index.html
          echo "<p>Scan the QR code below to download the APK on your Android device:</p>" >> index.html
          echo "<img alt=\"QR code\" src=\"https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://apk.cigale.gwen.works/cigale.apk\">" >> index.html
          echo "</body></html>" >> index.html

      - name: Save artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: apk-webpage
          path: |
            index.html
            cigale.apk

  apk-webpage-deploy:
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: apk-webpage
    name: Upload latest APK to dev deployments
    uses: ./.github/workflows/dev-deploy.yml
    secrets: inherit
    with:
      clear: false
      environment: APK Download Page
      artifact: apk-webpage
      path: /
      subdomain: apk
