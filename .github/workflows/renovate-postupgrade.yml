name: Renovate PRs postupgrade

on:
  pull_request:
    branches:
      - renovate/*

jobs:
  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    steps:
      - run: echo smoke
  capacitor:
    name: Capacitor-related tasks
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'android-native-changes')
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ssh-key: ${{ secrets.AUTOCOMMITS_DEPLOY_KEY }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - if: ${{ !contains(github.event.pull_request.changed_files, 'android/.native-code-version') }}
        name: Bump native code version
        run: |
          current=$(cat android/.native-code-version)
          echo Native code version is currently $current
          echo It'll be set to $(( current + 1))
          echo $(( current + 1 )) > android/.native-code-version

      - name: Run cap update
        # Can't use bun cap update because generated files are missing without first build.
        # So we shim an empty built webapp (just index.html) and run cap sync instead
        run: |
          mkdir public
          echo hello > public/index.html
          bun cap sync

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          commit_message: 📦 Update native code
          file_pattern: ios/ android/
