name: node_modules

permissions:
  actions: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  ELECTRON_SKIP_BINARY_DOWNLOAD: 'true'

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/nodemodules.yml
      - package.json
      - bun.lock

jobs:
  analyze:
    if: ${{ !startsWith(github.head_ref, 'renovate/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install node-modules-inspector
        run: bun install --global node-modules-inspector
      - name: Run node-modules-inspector
        run: bunx node-modules-inspector build --base /node-modules --outDir out
      - name: Save report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          path: ./out
          name: report
          retention-days: 1

  report:
    needs: analyze
    uses: ./.github/workflows/dev-deploy.yml
    secrets: inherit
    with:
      environment: node_modules analysis
      artifact: report
      subdomain: pr-${{ github.event.number }}-reports
      path: /node-modules
